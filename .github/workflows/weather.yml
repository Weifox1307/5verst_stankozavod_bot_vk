name: Daily Bot (Weather & Birthdays)

on:
  schedule:
    # 02:30 UTC — это 05:30 утра по МСК. 
    # С учетом задержек GitHub, придет как раз к 06:30 - 07:30.
    - cron: '30 2 * * *' 
  workflow_dispatch:

jobs:
  send_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5 # Обновил до v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Run bot
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_CHAT_IDS: ${{ secrets.VK_CHAT_IDS }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
        run: python bot.py
